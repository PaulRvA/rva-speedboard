  .p1 .podium-speed{color:#FFD700}
  .p1 .podium-block{background:rgba(184,134,11,0.85);border-color:#FFD700;height:clamp(75px,10vw,120px)}

  .p2 .podium-speed{color:#e8e8e8}

  .rest-section { padding:0.8rem 1.5rem 1rem; display:flex; flex-direction:column; gap:7px; }

  .rest-speed { font-family:'Orbitron',monospace; font-size:1rem; font-weight:700; color:#e10600; }

<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="checkered-top"></div>
<div class="red-line"></div>

<div class="content">
  <div class="board-header">
    <div class="board-title">Speed Hall of Shame</div>
    <div class="board-subtitle">RvA Service &mdash; Trackjack ranking</div>
    <div class="board-week" id="week-label"></div>
  </div>
  <div class="podium-section" id="podium"></div>
  <div class="rest-section" id="rest-list"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// HIER ELKE MAANDAG AANPASSEN — alleen deze 5 regels!
// ═══════════════════════════════════════════════
const RIJDERS = [
  { naam: "Rick van Amelsvoort",     snelheid: 190 },
  { naam: "Barry Schouw",      snelheid: 188 },
  { naam: "Marc Rademakers",       snelheid: 187 },
  { naam: "Yoeri Hellemons",    snelheid: 129 },
  { naam: "Erwin Gordeijns",     snelheid: 118 },
];
// ═══════════════════════════════════════════════

function getWeekLabel() {
  const d = new Date();
  const start = new Date(d);
  start.setDate(d.getDate() - (d.getDay()||7) + 1);
  const end = new Date(start); end.setDate(start.getDate() + 4);
  const fmt = dt => dt.toLocaleDateString('nl-NL',{day:'numeric',month:'long'});
  const dn = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day = dn.getUTCDay()||7; dn.setUTCDate(dn.getUTCDate()+4-day);
  const y1 = new Date(Date.UTC(dn.getUTCFullYear(),0,1));
  const wn = Math.ceil((((dn-y1)/86400000)+1)/7);
  return `Week ${wn} · ${fmt(start)} – ${fmt(end)} ${d.getFullYear()}`;
}

document.getElementById('week-label').textContent = getWeekLabel();

const sorted = [...RIJDERS].sort((a,b)=>b.snelheid-a.snelheid).slice(0,5);

const podiumOrder = sorted.length>=3
  ?[{d:sorted[1],cls:'p2',medal:'2',car:'🏎️'},{d:sorted[0],cls:'p1',medal:'1',car:'🏆'},{d:sorted[2],cls:'p3',medal:'3',car:'🚗'}]
  :sorted.length===2
  ?[{d:sorted[1],cls:'p2',medal:'2',car:'🏎️'},{d:sorted[0],cls:'p1',medal:'1',car:'🏆'}]
  :[{d:sorted[0],cls:'p1',medal:'1',car:'🏆'}];

const podium=document.getElementById('podium');
podiumOrder.forEach(({d,cls,medal,car})=>{
  const slot=document.createElement('div');
  slot.className=`podium-slot ${cls}`;
  slot.innerHTML=`
    <div class="podium-car">${car}</div>
    <div class="podium-name">${d.naam}</div>
    <div class="podium-speed">${d.snelheid}</div>
    <div class="podium-kmh">KM/H</div>
    <div class="podium-block"><span class="podium-pos">${medal}</span></div>`;
  podium.appendChild(slot);
});

const restList=document.getElementById('rest-list');
sorted.slice(3).forEach((d,i)=>{
  const row=document.createElement('div');
  row.className='rest-row';
  row.innerHTML=`
    <span class="rest-pos">${i+4}</span>
    <span class="rest-name">${d.naam}</span>
    <span class="rest-speed">${d.snelheid}</span>
    <span class="rest-kmh">KM/H</span>`;
  restList.appendChild(row);
});
</script>
</body>
</html>
